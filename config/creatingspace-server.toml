#.
#Parameters and abilities of Creating Space's kinetic mechanisms
[kinetics]

		#.
		#.
		#Fine tune the kinetic stats of individual components
		[kinetics.stressValues.v3]

			#.
			#.
			#[in Stress Units]
			#Configure the individual stress impact of mechanical blocks. Note that this cost is doubled for every speed increase it receives.
			[kinetics.stressValues.v3.impact]
				air_liquefier = 128.0
				catalyst_carrier = 8.0
				oxygen_sealer = 8.0
				mechanical_electrolyzer = 1024.0

#.
#
[rocketEngine]
	#.
	#.
	#the thrust in Newtons of the big engine
	# Default: 4905000
	# Range: > 0
	bigRocketEngineThrust = 4905000
	#.
	#the thrust in Newtons of the small engine
	# Default: 98100
	# Range: > 0
	smallRocketEngineThrust = 98100
	#.
	# reduction coefficient on the consumption
	# Default: 1.5
	# Range: 0.10000000149011612 ~ 3.4028234663852886E38
	ISPModifier = 1.5

#.
#config for the oxygen room
[oxygenRoom]
	#.
	#leaf oxygen production
	# Default: 2
	# Range: > 1
	leaf02Prod = 2
	#.
	#living entity consumption
	# Default: 10
	# Range: > 1
	living02Consumption = 10
	#.
	#maximum number of blocks a room can have per sealer before it's declared unsealable, warning putting an high number will make the search slower
	# Default: 1000
	# Range: > 1
	maxSizePerSealer = 1000
	#.
	#maximum number of blocks a room can search per tick, warning putting an high number can cause lag
	# Default: 1000
	# Range: > 1
	maxBlockPerTick = 1000
	#.
	#don't kill and remake the room each time there is a block change (experimental)
	smarterSearch = false
